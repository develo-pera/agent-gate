[profile.default]
src = "contracts"
out = "out"
libs = ["lib"]
solc = "0.8.24"
optimizer = true
optimizer_runs = 200

[profile.default.fuzz]
runs = 256

[rpc_endpoints]
base = "https://mainnet.base.org"
mainnet = "${RPC_URL}"
arbitrum = "https://arb1.arbitrum.io/rpc"
holesky = "https://ethereum-holesky-rpc.publicnode.com"
sepolia = "https://rpc.sepolia.org"
status_sepolia = "https://public.sepolia.rpc.status.network"
